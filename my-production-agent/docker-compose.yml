version: "3.9"
services:
  agent:
    build: .
    environment:
      - PORT=8000
      - REDIS_URL=redis://redis:6379/0
      - AGENT_API_KEY=secret
    depends_on:
      redis:
        condition: service_healthy
    networks:
      - my_net
    deploy:
      replicas: 3
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 3
    networks:
      - my_net

  nginx:
    image: nginx:alpine
    ports:
      - "8080:80"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - agent
    networks:
      - my_net

networks:
  my_net:
    driver: bridge
